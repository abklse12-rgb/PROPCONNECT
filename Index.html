<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#EFEBE3" />
<title>PropConnect — Prototype</title>
<style>
  html, body { margin: 0; padding: 0; background: #EFEBE3; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
  #boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; font-family: system-ui, -apple-system, sans-serif; color: #6C685E; padding: 24px; }
  #boot .spin { width: 34px; height: 34px; border: 3px solid #D6E7DE; border-top-color: #0B5A43; border-radius: 50%; animation: bootspin 1s linear infinite; }
  #boot .lbl { font-size: 14px; font-weight: 600; }
  #boot small { font-size: 12px; color: #A6A197; max-width: 300px; text-align: center; line-height: 1.55; }
  @keyframes bootspin { to { transform: rotate(360deg); } }
</style>

<!-- Resolve bare imports (react / recharts / lucide-react) to a CDN that serves ES modules -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react",
    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom"
  }
}
</script>

<!-- Babel compiles the JSX in the browser -->
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<div id="boot">
  <div class="spin"></div>
  <div class="lbl">Loading PropConnect…</div>
  <small>The first load fetches React, charts and icons from the internet — please stay online the first time you open this file. After that your browser caches them.</small>
</div>

<!-- If the libraries fail to load, show a friendly message -->
<script>
  setTimeout(function () {
    var r = document.getElementById('root');
    if (r && r.childElementCount === 0) {
      var b = document.getElementById('boot');
      if (b) b.innerHTML = '<div style="font-family:system-ui,sans-serif;color:#B4453A;max-width:320px;text-align:center;line-height:1.6;font-size:14px">Couldn\u2019t load the prototype. This file needs an internet connection the first time it runs (it downloads React, charts and icons). Please check your connection and reload the page.</div>';
    }
  }, 15000);
</script>

<!-- The PropConnect prototype (JSX compiled by Babel, run as a module so the imports above resolve) -->
<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef, useMemo } from "react";
import {
  ChevronLeft, ArrowRight, ShieldCheck, Camera, User, Building2, MapPin,
  MessagesSquare, LayoutGrid, TrendingUp, Map as MapIcon, Calculator,
  Wifi, Bell, Search, Check, Loader2, Sparkles, Lock, ChevronRight, X,
  Phone, PhoneOff, Mic, MicOff, Volume2, Plus, Send, Paperclip,
  Users, Crown, UserPlus, MoreVertical,
  Ruler, Tag, Hash, Layers, BedDouble, Clock, ImagePlus, Image as ImageIcon,
  ChevronDown, Hammer, LogOut, Info,
  BellOff, FileText, Film, Trash2, PhoneOutgoing, PhoneIncoming, Navigation, Folder, Play
} from "lucide-react";
import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, AreaChart, Area } from "recharts";

/* =========================================================================
   PropConnect — broker network prototype
   PART 1: Onboarding & Auth + Home shell
   (Parts 2–6 add: Chat, Auto-listings, Market analytics, Estimator, Maps)
   ========================================================================= */

const STYLE = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

:root{
  --paper:#F6F4EF; --surface:#FFFFFF; --surface-2:#FBFAF6;
  --ink:#1C1B16; --ink-soft:#6C685E; --ink-faint:#A6A197;
  --line:#E9E5DD; --line-soft:#F1EEE7;
  --green:#0B5A43; --green-700:#0A4C39; --green-deep:#073B2C;
  --green-tint:#EAF2EE; --green-tint-2:#D6E7DE; --green-ink:#0C5C44;
  --gold:#A98A57;
  --danger:#B4453A;
  --r-sm:12px; --r-md:14px; --r-lg:18px; --r-xl:22px;
  --sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --sh-sm:0 1px 2px rgba(20,35,28,.05),0 1px 3px rgba(20,35,28,.04);
  --sh-md:0 6px 22px rgba(14,45,34,.07),0 2px 6px rgba(14,45,34,.04);
  --sh-lg:0 18px 50px rgba(12,45,34,.12);
}

*{box-sizing:border-box;}
.pc-root{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;}

.pc-stage{
  min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(1100px 760px at 50% -8%, #EFECE4, #E8E4DB 46%, #E2DDD3 100%);
  padding:30px 16px;
}
.pc-bezel{
  background:#13120D;padding:7px;border-radius:54px;
  box-shadow:0 44px 90px -28px rgba(8,32,24,.55),0 2px 8px rgba(0,0,0,.35),inset 0 0 0 1px #2a2820;
}
.pc-screen{
  width:392px;height:min(844px,92vh);background:var(--paper);border-radius:47px;
  overflow:hidden;position:relative;display:flex;flex-direction:column;
}
.pc-island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:112px;height:31px;background:#13120D;border-radius:999px;z-index:60;}

/* status bar */
.pc-status{height:52px;flex:0 0 52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:relative;z-index:40;}
.pc-status .t{font-weight:600;font-size:15px;letter-spacing:.2px;}
.pc-status .ic{display:flex;align-items:center;gap:6px;}
.pc-batt{width:24px;height:12px;border:1.5px solid var(--ink);border-radius:3px;position:relative;opacity:.9;}
.pc-batt::after{content:'';position:absolute;right:-3px;top:3px;width:2px;height:6px;background:var(--ink);border-radius:0 1px 1px 0;opacity:.6;}
.pc-batt > i{position:absolute;inset:1.5px;width:70%;background:var(--ink);border-radius:1px;display:block;}
.pc-sig{display:flex;align-items:flex-end;gap:1.5px;height:11px;}
.pc-sig > b{width:3px;background:var(--ink);border-radius:1px;display:block;}

/* layout helpers */
.pc-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.pc-body::-webkit-scrollbar{width:0;height:0;}
.screen{min-height:100%;display:flex;flex-direction:column;animation:fadeUp .42s cubic-bezier(.2,.7,.2,1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes pop{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){.screen,*{animation:none!important;}}

/* typography */
.h1{font-size:25px;line-height:1.18;font-weight:700;letter-spacing:-.02em;margin:0;}
.h2{font-size:17px;font-weight:600;letter-spacing:-.01em;margin:0;}
.lead{font-size:14.5px;line-height:1.5;color:var(--ink-soft);margin:8px 0 0;}
.muted{color:var(--ink-soft);}
.faint{color:var(--ink-faint);}
.fine{font-size:11.5px;line-height:1.5;color:var(--ink-faint);text-align:center;}

/* buttons */
.btn{appearance:none;border:0;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:15.5px;
  border-radius:var(--r-md);height:54px;display:inline-flex;align-items:center;justify-content:center;gap:9px;
  transition:transform .12s ease, background .15s ease, opacity .15s ease;width:100%;}
.btn:active{transform:scale(.985);}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 8px 20px -8px rgba(11,90,67,.5);}
.btn-primary:active{background:var(--green-deep);}
.btn-primary:disabled{background:#C9CFC9;color:#fff;box-shadow:none;cursor:not-allowed;}
.btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:var(--sh-sm);}
.btn-soft{background:var(--green-tint);color:var(--green-ink);}
.icon-btn{width:42px;height:42px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--line);color:var(--ink);cursor:pointer;box-shadow:var(--sh-sm);transition:transform .12s;}
.icon-btn:active{transform:scale(.94);}

/* fields */
.field{margin-top:16px;}
.label{font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:0 0 8px 2px;display:block;letter-spacing:.01em;}
.input{width:100%;height:54px;border-radius:var(--r-md);border:1.5px solid var(--line);background:var(--surface);
  padding:0 16px;font-size:16px;font-family:var(--sans);color:var(--ink);outline:none;transition:border .15s, box-shadow .15s;}
.input::placeholder{color:var(--ink-faint);}
.input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(11,90,67,.10);}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-wrap .lead-ic{position:absolute;left:15px;color:var(--ink-faint);pointer-events:none;}
.input-wrap .input{padding-left:46px;}

/* phone input group */
.phone-row{display:flex;gap:10px;}
.cc{height:54px;min-width:92px;border-radius:var(--r-md);border:1.5px solid var(--line);background:var(--surface);
  display:flex;align-items:center;gap:8px;padding:0 14px;font-size:16px;font-weight:600;}
.flag{width:24px;height:17px;border-radius:3px;overflow:hidden;display:inline-block;box-shadow:0 0 0 1px rgba(0,0,0,.05);}

/* otp */
.otp-row{display:flex;gap:8px;margin-top:22px;}
.otp-box{flex:1 1 0;min-width:0;width:0;height:56px;border-radius:13px;border:1.5px solid var(--line);background:var(--surface);
  text-align:center;font-size:22px;font-weight:600;color:var(--ink);outline:none;font-family:var(--sans);transition:border .15s, box-shadow .15s;padding:0;}
.otp-box:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(11,90,67,.10);}
.otp-box.filled{border-color:var(--green-tint-2);background:var(--green-tint);}

/* hint pill */
.hint{display:inline-flex;align-items:center;gap:7px;background:var(--green-tint);color:var(--green-ink);
  font-size:12px;font-weight:600;padding:8px 12px;border-radius:999px;margin-top:16px;}

/* badge tile */
.tile{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.tile-green{background:var(--green-tint);color:var(--green-ink);}

/* welcome */
.welcome{padding:0 26px 26px;}
.welcome-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:0;}
.wordmark{font-family:var(--serif);font-size:34px;font-weight:600;letter-spacing:-.01em;margin:22px 0 0;color:var(--ink);}
.tagline{font-size:14.5px;line-height:1.55;color:var(--ink-soft);max-width:280px;margin:14px auto 0;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:22px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
  color:var(--ink-soft);font-size:11.5px;font-weight:600;padding:7px 11px;border-radius:999px;box-shadow:var(--sh-sm);}
.welcome-foot{padding-top:8px;}

.reveal-1{animation:fadeUp .6s .02s both cubic-bezier(.2,.7,.2,1);}
.reveal-2{animation:fadeUp .6s .12s both cubic-bezier(.2,.7,.2,1);}
.reveal-3{animation:fadeUp .6s .22s both cubic-bezier(.2,.7,.2,1);}
.reveal-4{animation:fadeUp .6s .32s both cubic-bezier(.2,.7,.2,1);}

/* auth screen scaffold */
.authpad{padding:8px 26px 26px;}
.back{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--line);color:var(--ink);cursor:pointer;box-shadow:var(--sh-sm);}
.auth-head{margin-top:22px;}
.auth-foot{margin-top:auto;padding-top:20px;}

/* profile avatar */
.avatar-pick{width:104px;height:104px;border-radius:50%;background:var(--green-tint);border:1px dashed var(--green-tint-2);
  display:flex;align-items:center;justify-content:center;color:var(--green-ink);cursor:pointer;position:relative;margin:6px auto 0;overflow:hidden;}
.avatar-pick img{width:100%;height:100%;object-fit:cover;}
.avatar-cam{position:absolute;bottom:0;right:0;width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(11,90,67,.4);border:2px solid var(--paper);}

/* ===== HOME ===== */
.topbar{height:60px;flex:0 0 60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;background:var(--paper);border-bottom:1px solid var(--line-soft);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-name{font-size:18px;font-weight:700;letter-spacing:-.02em;}
.brand-name .g{color:var(--green-ink);}
.avatar-sm{width:38px;height:38px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:14px;overflow:hidden;cursor:pointer;}
.avatar-sm img{width:100%;height:100%;object-fit:cover;}

.page{padding:18px 18px 96px;}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:2px 0 0;}
.searchbar{display:flex;align-items:center;gap:10px;height:46px;background:var(--surface);border:1px solid var(--line);
  border-radius:13px;padding:0 14px;margin-top:14px;color:var(--ink-faint);box-shadow:var(--sh-sm);}
.searchbar input{border:0;outline:0;background:transparent;font-family:var(--sans);font-size:14.5px;color:var(--ink);width:100%;}

.empty{display:flex;flex-direction:column;align-items:center;text-align:center;padding:46px 18px 10px;}
.empty .tile{width:64px;height:64px;border-radius:20px;margin-bottom:18px;}
.empty h3{font-size:17px;font-weight:700;margin:0;letter-spacing:-.01em;}
.empty p{font-size:13.5px;line-height:1.55;color:var(--ink-soft);margin:8px auto 0;max-width:250px;}

/* preview card for upcoming tabs */
.preview{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);padding:24px 20px;margin-top:18px;box-shadow:var(--sh-md);}
.preview .tile{width:58px;height:58px;border-radius:18px;}
.preview h3{font-size:19px;font-weight:700;margin:16px 0 0;letter-spacing:-.02em;}
.preview p{font-size:13.5px;line-height:1.55;color:var(--ink-soft);margin:8px 0 0;}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:999px;
  background:var(--green-tint);color:var(--green-ink);margin-top:16px;letter-spacing:.02em;}
.feat-list{margin-top:18px;display:flex;flex-direction:column;gap:12px;}
.feat-row{display:flex;align-items:flex-start;gap:12px;}
.feat-row .dot{width:22px;height:22px;border-radius:7px;background:var(--green-tint);color:var(--green-ink);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px;}
.feat-row span{font-size:13.5px;line-height:1.45;color:var(--ink);}

/* bottom nav */
.nav{position:absolute;left:0;right:0;bottom:0;height:78px;background:rgba(246,244,239,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:flex;align-items:flex-start;justify-content:space-around;padding:9px 8px 0;z-index:30;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:0;cursor:pointer;
  color:var(--ink-faint);font-family:var(--sans);font-size:10.5px;font-weight:600;padding:4px 2px;transition:color .15s;}
.nav-item .nic{width:42px;height:30px;border-radius:11px;display:flex;align-items:center;justify-content:center;transition:background .18s;}
.nav-item.active{color:var(--green-ink);}
.nav-item.active .nic{background:var(--green-tint);}

/* toast */
.toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);background:var(--ink);color:#fff;
  font-size:13px;font-weight:500;padding:11px 16px;border-radius:12px;box-shadow:var(--sh-lg);z-index:80;
  display:flex;align-items:center;gap:8px;max-width:80%;animation:pop .2s ease;}
.toast .tk{color:#8FE3C0;display:flex;}

/* ===== PART 2: chat list, conversation, group, call ===== */
.chat-list{padding:0 0 96px;}
.chat-row{display:flex;align-items:center;gap:13px;padding:12px 18px 0;cursor:pointer;transition:background .12s;}
.chat-row:active{background:var(--line-soft);}
.av{width:50px;height:50px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.av-sq{border-radius:15px;}
.chat-main{flex:1;min-width:0;border-bottom:1px solid var(--line-soft);padding-bottom:12px;}
.chat-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.chat-name{font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-time{font-size:11.5px;color:var(--ink-faint);flex:0 0 auto;}
.chat-prev{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:3px;}
.chat-msg{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{min-width:20px;height:20px;border-radius:10px;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px;flex:0 0 auto;}

.chat-panel{position:absolute;top:52px;left:0;right:0;bottom:0;background:var(--paper);z-index:50;display:flex;flex-direction:column;animation:slideIn .26s cubic-bezier(.2,.7,.2,1);}
@keyframes slideIn{from{transform:translateX(26px);opacity:0}to{transform:none;opacity:1}}
.conv-head{height:60px;flex:0 0 60px;display:flex;align-items:center;gap:9px;padding:0 8px 0 2px;background:var(--surface);border-bottom:1px solid var(--line);}
.conv-head .av{width:40px;height:40px;font-size:14px;cursor:pointer;}
.conv-title{flex:1;min-width:0;cursor:pointer;}
.conv-title .nm{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-title .sub{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.conv-banner{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--green-tint);color:var(--green-ink);font-size:11.5px;font-weight:600;}
.conv-banner .gd{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(11,90,67,.16);flex:0 0 auto;}
.msgs{flex:1;overflow-y:auto;padding:8px 14px 10px;display:flex;flex-direction:column;}
.msgs::-webkit-scrollbar{width:0}
.daysep{align-self:center;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);font-size:11px;font-weight:600;padding:4px 12px;border-radius:999px;margin:6px 0 8px;box-shadow:var(--sh-sm);}
.row{display:flex;width:100%;margin-top:6px;}
.row.me{justify-content:flex-end;}
.bub{max-width:80%;padding:8px 12px 6px;border-radius:16px;box-shadow:var(--sh-sm);}
.bub.in{background:var(--surface);border-top-left-radius:5px;}
.bub.out{background:var(--green);border-top-right-radius:5px;}
.bub .snd{font-size:12px;font-weight:700;margin-bottom:3px;}
.bub .txt{font-size:14px;line-height:1.42;white-space:pre-wrap;word-break:break-word;color:var(--ink);}
.bub.out .txt{color:#fff;}
.bub .tm{font-size:10px;margin-top:3px;text-align:right;color:var(--ink-faint);}
.bub.out .tm{color:rgba(255,255,255,.72);}
.composer{flex:0 0 auto;display:flex;align-items:flex-end;gap:9px;padding:10px 12px;background:var(--surface);border-top:1px solid var(--line);}
.composer .cin{flex:1;min-height:44px;max-height:120px;border:1.5px solid var(--line);border-radius:22px;padding:11px 16px;font-family:var(--sans);font-size:14.5px;resize:none;outline:none;background:var(--paper);line-height:1.4;color:var(--ink);}
.composer .cin:focus{border-color:var(--green);}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;border:0;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;transition:transform .12s;}
.send-btn:active{transform:scale(.92);}
.send-btn:disabled{background:#C9CFC9;cursor:default;}
.attach{width:44px;height:44px;border-radius:50%;background:var(--paper);border:1.5px solid var(--line);color:var(--ink-soft);display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;}

.info-head{height:60px;flex:0 0 60px;display:flex;align-items:center;gap:4px;padding:0 8px;background:var(--surface);border-bottom:1px solid var(--line);}
.info-head .ttl{font-size:16px;font-weight:600;}
.info-scroll{flex:1;overflow-y:auto;}
.info-scroll::-webkit-scrollbar{width:0}
.info-hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 20px 20px;background:var(--surface);border-bottom:1px solid var(--line);}
.info-hero .av{width:84px;height:84px;font-size:28px;margin-bottom:12px;}
.info-hero h2{font-size:20px;font-weight:700;margin:0;letter-spacing:-.01em;}
.info-hero p{font-size:13px;color:var(--ink-soft);margin:5px 0 0;}
.sec{margin-top:12px;background:var(--surface);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding-bottom:6px;}
.sec-h{font-size:11.5px;font-weight:700;color:var(--ink-faint);letter-spacing:.05em;text-transform:uppercase;padding:14px 18px 6px;}
.mem{display:flex;align-items:center;gap:12px;padding:9px 18px;}
.mem .av{width:44px;height:44px;font-size:15px;}
.mem .mm{flex:1;min-width:0;}
.mem .mn{font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:7px;}
.mem .ma{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.crown{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--gold);background:#F6EFE1;padding:2px 8px;border-radius:999px;}
.act-row{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;color:var(--green-ink);font-weight:600;font-size:14.5px;}
.act-row.locked{color:var(--ink-faint);cursor:default;}
.act-ic{width:44px;height:44px;border-radius:50%;background:var(--green-tint);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.act-row.locked .act-ic{background:var(--line-soft);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 18px;}
.toggle-row .tl{font-size:14px;font-weight:600;color:var(--ink);}
.toggle-row .td{font-size:12px;color:var(--ink-soft);margin-top:3px;max-width:210px;line-height:1.4;}
.sw{width:48px;height:28px;border-radius:999px;background:#D6D2C8;position:relative;cursor:pointer;transition:background .18s;flex:0 0 auto;}
.sw.on{background:var(--green);}
.sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.sw.on i{transform:translateX(20px);}
.pick-row{display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;}
.pick-row:active{background:var(--line-soft);}
.pick-row .av{width:44px;height:44px;font-size:15px;}
.cbx{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#fff;}
.cbx.on{background:var(--green);border-color:var(--green);}
.namefield{padding:18px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px;}
.namefield .av{width:54px;height:54px;}
.panel-foot{flex:0 0 auto;padding:12px 18px;background:var(--surface);border-top:1px solid var(--line);}

.sheet-mask{position:absolute;inset:0;background:rgba(20,25,20,.42);z-index:60;display:flex;align-items:flex-end;animation:fadeM .2s;}
@keyframes fadeM{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-height:74%;background:var(--paper);border-radius:24px 24px 0 0;display:flex;flex-direction:column;animation:upM .26s cubic-bezier(.2,.7,.2,1);overflow:hidden;}
@keyframes upM{from{transform:translateY(40px)}to{transform:none}}
.sheet-grab{width:38px;height:4px;border-radius:2px;background:#D6D2C8;margin:10px auto 2px;}
.sheet-h{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 10px;}
.sheet-h h3{font-size:17px;font-weight:700;margin:0;}
.sheet-body{overflow-y:auto;padding-bottom:24px;}
.sheet-body::-webkit-scrollbar{width:0}

.call-screen{position:absolute;inset:0;z-index:80;background:linear-gradient(165deg,#0C5C44 0%,#073B2C 100%);color:#fff;display:flex;flex-direction:column;align-items:center;padding:0 24px;}
.call-top{padding-top:54px;text-align:center;display:flex;flex-direction:column;align-items:center;flex:1;}
.call-av{width:118px;height:118px;border-radius:50%;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:700;overflow:hidden;}
.call-av img{width:100%;height:100%;object-fit:cover;}
.ring-pulse{position:absolute;width:118px;height:118px;border-radius:50%;border:2px solid rgba(255,255,255,.45);animation:ring 1.8s ease-out infinite;}
@keyframes ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.5);opacity:0}}
.call-name{font-size:25px;font-weight:700;letter-spacing:-.01em;}
.call-status{font-size:14px;color:rgba(255,255,255,.78);margin-top:8px;letter-spacing:.03em;}
.call-controls{display:flex;justify-content:center;gap:22px;padding-bottom:48px;}
.cc-btn{display:flex;flex-direction:column;align-items:center;gap:9px;font-size:12px;color:rgba(255,255,255,.85);font-weight:500;}
.cc-circle{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .12s;}
.cc-circle:active{transform:scale(.92);}
.cc-circle.on{background:#fff;color:var(--green-ink);}
.cc-end{background:#D6453C;}

@keyframes spin{to{transform:rotate(360deg)}}

/* ===== PART 3: listings ===== */
.feed{padding:0 0 96px;}
.chips-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 18px 2px;scrollbar-width:none;}
.chips-scroll::-webkit-scrollbar{display:none;}
.fchip{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 15px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;}
.fchip.on{background:var(--green);border-color:var(--green);color:#fff;}
.lcard{background:var(--surface);border:1px solid var(--line);border-radius:18px;margin:14px 18px 0;overflow:hidden;box-shadow:var(--sh-md);cursor:pointer;transition:transform .12s;}
.lcard:active{transform:scale(.99);}
.lcard-img{height:150px;width:100%;position:relative;background:linear-gradient(135deg,#EDEAE3,#E2DED5);display:flex;align-items:center;justify-content:center;}
.lcard-img img{width:100%;height:100%;object-fit:cover;}
.lcard-img .ph{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--ink-faint);}
.lcard-img .cnt{position:absolute;right:10px;bottom:10px;background:rgba(20,20,16,.72);color:#fff;font-size:11px;font-weight:600;padding:4px 8px;border-radius:8px;display:flex;align-items:center;gap:4px;}
.lcard-badges{position:absolute;left:10px;top:10px;display:flex;gap:6px;}
.lbadge{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:999px;}
.lbadge.new{background:var(--green);color:#fff;}
.lbadge.type{background:rgba(255,255,255,.94);color:var(--ink);}
.lbadge.wanted{background:#9A6A3A;color:#fff;}
.lcard-body{padding:13px 15px 14px;}
.lcard-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.ltitle{font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
.ltime{font-size:11.5px;color:var(--ink-faint);flex:0 0 auto;margin-top:2px;}
.lsub{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
.lprice{font-size:19px;font-weight:700;color:var(--green-ink);margin-top:9px;letter-spacing:-.01em;}
.lprice .u{font-size:13px;font-weight:600;color:var(--ink-soft);margin-left:3px;}
.lfoot{display:flex;align-items:center;gap:10px;margin-top:13px;padding-top:12px;border-top:1px solid var(--line-soft);}
.lfoot .av{width:34px;height:34px;font-size:12px;}
.lfoot .who{flex:1;min-width:0;}
.lfoot .wn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lfoot .wa{font-size:11px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lbtn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;flex:0 0 auto;transition:transform .12s;}
.lbtn:active{transform:scale(.92);}
.lbtn.call{background:var(--green);border-color:var(--green);color:#fff;}
.mine-tag{font-size:11px;font-weight:700;color:var(--green-ink);background:var(--green-tint);padding:6px 12px;border-radius:999px;flex:0 0 auto;}

.det{position:absolute;top:52px;left:0;right:0;bottom:0;background:var(--paper);z-index:55;display:flex;flex-direction:column;animation:slideIn .26s cubic-bezier(.2,.7,.2,1);}
.det-head{height:56px;flex:0 0 56px;display:flex;align-items:center;gap:4px;padding:0 8px;background:var(--surface);border-bottom:1px solid var(--line);}
.det-scroll{flex:1;overflow-y:auto;}
.det-scroll::-webkit-scrollbar{width:0}
.gallery{position:relative;height:232px;background:linear-gradient(135deg,#EDEAE3,#E2DED5);}
.gallery .track{display:flex;height:100%;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;}
.gallery .track::-webkit-scrollbar{display:none;}
.gallery .slide{flex:0 0 100%;height:100%;scroll-snap-align:start;position:relative;}
.gallery .slide img{width:100%;height:100%;object-fit:cover;}
.gallery .ph{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--ink-faint);}
.gal-rm{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(20,20,16,.6);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border:0;}
.gal-add{position:absolute;right:14px;bottom:14px;background:#fff;color:var(--green-ink);border:0;border-radius:12px;height:40px;padding:0 14px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;cursor:pointer;box-shadow:var(--sh-md);}
.det-body{padding:18px;}
.det-type{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--green-ink);background:var(--green-tint);padding:5px 11px;border-radius:999px;}
.det-title{font-size:23px;font-weight:700;letter-spacing:-.02em;margin:12px 0 0;}
.det-loc{font-size:14px;color:var(--ink-soft);margin-top:6px;display:flex;align-items:center;gap:7px;}
.det-price{font-size:27px;font-weight:700;color:var(--green-ink);margin-top:14px;letter-spacing:-.02em;}
.spec{background:var(--surface);border:1px solid var(--line);border-radius:16px;margin-top:18px;overflow:hidden;}
.spec-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line-soft);font-size:14px;}
.spec-row:last-child{border-bottom:0;}
.spec-row .k{color:var(--ink-soft);display:flex;align-items:center;gap:10px;}
.spec-row .v{font-weight:600;color:var(--ink);text-align:right;}
.feat-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.feat-chip{font-size:12px;font-weight:600;color:var(--ink);background:var(--surface);border:1px solid var(--line);padding:7px 12px;border-radius:999px;}
.src-card{background:var(--green-tint);border-radius:14px;padding:14px 16px;margin-top:18px;}
.src-card .sh{font-size:11px;font-weight:700;color:var(--green-ink);letter-spacing:.03em;display:flex;align-items:center;gap:7px;text-transform:uppercase;}
.src-card .sq{font-size:13.5px;color:var(--ink);margin-top:8px;white-space:pre-wrap;line-height:1.5;}
.poster{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:18px;}
.poster .av{width:50px;height:50px;font-size:16px;}
.poster .pm{flex:1;min-width:0;}
.poster .pn{font-size:15px;font-weight:700;}
.poster .pa{font-size:12.5px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.det-actions{display:flex;gap:10px;margin-top:14px;}
.btn-call{background:var(--green);color:#fff;}
.btn-msg{background:var(--surface);border:1px solid var(--line);color:var(--ink);}

/* ===== PART 4: market analytics ===== */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:0 18px;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:13px 14px;box-shadow:var(--sh-sm);}
.stat .sl{font-size:11px;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
.stat .sv{font-size:21px;font-weight:700;letter-spacing:-.02em;margin-top:7px;color:var(--ink);line-height:1.1;}
.stat .sv .u{font-size:12px;color:var(--ink-soft);font-weight:600;margin-left:4px;}
.stat .sd{font-size:11px;color:var(--green-ink);font-weight:600;margin-top:5px;}
.acard{background:var(--surface);border:1px solid var(--line);border-radius:18px;margin:14px 18px 0;padding:15px 16px 14px;box-shadow:var(--sh-sm);}
.acard-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:2px;}
.acard-t{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
.acard-s{font-size:11px;color:var(--ink-faint);font-weight:600;}
.chart-wrap{width:100%;height:188px;margin-top:8px;}
.legend{display:flex;gap:16px;flex-wrap:wrap;}
.legend .li{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);font-weight:600;width:100%;}
.legend .dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto;}
.atable{width:100%;margin-top:8px;border-collapse:collapse;font-size:12.5px;}
.atable th{text-align:right;font-weight:700;color:var(--ink-faint);font-size:10px;text-transform:uppercase;letter-spacing:.03em;padding:8px 5px;border-bottom:1px solid var(--line);}
.atable th:first-child{text-align:left;}
.atable td{padding:10px 5px;border-bottom:1px solid var(--line-soft);text-align:right;font-weight:600;color:var(--ink);}
.atable td:first-child{text-align:left;font-weight:700;}
.atable tr:last-child td{border-bottom:0;}
.atable .muted{color:var(--ink-faint);font-weight:500;}
.hotrow{display:flex;align-items:center;gap:10px;margin-top:12px;}
.hotrow .hn{font-size:13px;font-weight:600;width:112px;flex:0 0 auto;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hotbar{flex:1;height:8px;border-radius:6px;background:var(--line-soft);overflow:hidden;}
.hotbar > i{display:block;height:100%;background:var(--green);border-radius:6px;}
.hotrow .hc{font-size:12px;font-weight:700;color:var(--green-ink);width:52px;text-align:right;flex:0 0 auto;}
.demand-bar{display:flex;height:42px;border-radius:12px;overflow:hidden;margin-top:10px;}
.demand-bar .seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;min-width:fit-content;padding:0 8px;white-space:nowrap;}
.demand-note{font-size:12px;color:var(--ink-soft);margin-top:10px;line-height:1.5;}

/* ===== PART 5: estimator ===== */
.fg{margin-top:16px;}
.fg-l{font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:0 0 8px 2px;display:block;}
.sel-wrap{position:relative;}
.sel{width:100%;height:50px;border:1.5px solid var(--line);border-radius:14px;background:var(--surface);padding:0 42px 0 14px;font-family:var(--sans);font-size:15px;font-weight:600;color:var(--ink);appearance:none;-webkit-appearance:none;cursor:pointer;}
.sel:focus{outline:none;border-color:var(--green);}
.sel-wrap .chev{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ink-faint);}
.seg-ctl{display:flex;background:var(--line-soft);border-radius:12px;padding:3px;gap:3px;}
.seg-opt{flex:1;height:40px;border:0;background:transparent;border-radius:9px;font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:all .15s;white-space:nowrap;padding:0 4px;}
.seg-opt.on{background:var(--surface);color:var(--green-ink);box-shadow:var(--sh-sm);}
.num-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.numf{display:flex;flex-direction:column;gap:6px;}
.numf .nlab{font-size:11px;color:var(--ink-soft);font-weight:600;margin-left:2px;}
.numf .nbox{position:relative;}
.numf .nbox input{width:100%;height:48px;border:1.5px solid var(--line);border-radius:12px;padding:0 42px 0 12px;font-size:15px;font-weight:600;font-family:var(--sans);color:var(--ink);outline:none;background:var(--surface);}
.numf .nbox input:focus{border-color:var(--green);}
.numf .nbox .suf{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11.5px;color:var(--ink-faint);font-weight:600;pointer-events:none;}
.est-result{background:linear-gradient(165deg,#0C5C44,#073B2C);color:#fff;border-radius:20px;margin:18px 18px 0;padding:20px;box-shadow:var(--sh-lg);}
.est-result .el{font-size:11.5px;font-weight:600;opacity:.82;letter-spacing:.05em;text-transform:uppercase;}
.est-total{font-size:33px;font-weight:700;letter-spacing:-.02em;margin-top:6px;line-height:1.05;}
.est-sub{font-size:12.5px;opacity:.72;margin-top:4px;}
.est-meta{font-size:12.5px;opacity:.85;margin-top:8px;}
.est-chips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.est-chip{background:rgba(255,255,255,.14);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.bd-row{margin-top:13px;}
.bd-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-bottom:6px;}
.bd-top .bl{color:var(--ink);font-weight:600;}
.bd-top .ba{color:var(--ink);font-weight:700;}
.bd-bar{height:7px;border-radius:5px;background:var(--line-soft);overflow:hidden;}
.bd-bar>i{display:block;height:100%;border-radius:5px;}
.inc-list{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
.inc-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--ink);line-height:1.4;}
.inc-item .ck{width:20px;height:20px;border-radius:6px;background:var(--green-tint);color:var(--green-ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px;}
.est-note{font-size:11.5px;color:var(--ink-faint);line-height:1.5;margin:14px 20px 0;text-align:center;}

/* ===== PART 6: maps ===== */
.map-canvas{flex:1;position:relative;overflow:hidden;background:#E9E6DF;min-height:0;}
.map-svg{position:absolute;inset:0;width:100%;height:100%;}
.mpin{position:absolute;transform:translate(-50%,-100%);background:none;border:0;cursor:pointer;padding:0;filter:drop-shadow(0 3px 3px rgba(0,0,0,.28));transition:transform .12s;-webkit-tap-highlight-color:transparent;}
.mpin svg{display:block;}
.mpin.sel{transform:translate(-50%,-100%) scale(1.3);z-index:6;}
.phase-lbl{position:absolute;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:rgba(58,56,46,.72);letter-spacing:.02em;pointer-events:none;white-space:nowrap;text-shadow:0 1px 0 rgba(255,255,255,.55);z-index:2;}
.map-top{position:absolute;top:12px;left:12px;right:12px;z-index:8;display:flex;flex-direction:column;gap:8px;align-items:center;}
.map-seg{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh-md);display:flex;padding:3px;gap:3px;}
.map-seg button{height:36px;padding:0 16px;border:0;background:transparent;border-radius:9px;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;gap:6px;}
.map-seg button.on{background:var(--green);color:#fff;}
.map-chips{width:100%;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.map-chips::-webkit-scrollbar{display:none;}
.map-chips .fchip{box-shadow:var(--sh-sm);flex:0 0 auto;}
.map-legend{position:absolute;left:12px;bottom:90px;z-index:7;background:rgba(255,255,255,.94);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:12px;padding:10px 12px;box-shadow:var(--sh-md);display:flex;flex-direction:column;gap:7px;}
.map-legend .li{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:600;color:var(--ink-soft);}
.map-legend .pindot{width:11px;height:11px;border-radius:50%;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.06);flex:0 0 auto;}
.map-count{position:absolute;right:12px;bottom:90px;z-index:7;background:rgba(28,27,22,.86);color:#fff;font-size:12px;font-weight:600;padding:8px 12px;border-radius:999px;box-shadow:var(--sh-md);display:flex;align-items:center;gap:6px;}

function OtpVerify({ phone, onBack, onNext }) {
  const [otp, setOtp] = useState(["", "", "", "", "", ""]);
  const [seconds, setSeconds] = useState(30);
  const [verifying, setVerifying] = useState(false);
  const refs = useRef([]);
  useEffect(() => { if (seconds <= 0) return; const t = setTimeout(() => setSeconds((s) => s - 1), 1000); return () => clearTimeout(t); }, [seconds]);
  const filled = otp.every((d) => d !== "");
  const display = "+92 " + (phone.slice(0, 3) + " " + phone.slice(3));

  function change(i, v) {
    const val = v.replace(/\D/g, "");
    if (val.length > 1) {
      const chars = val.slice(0, 6).split("");
      const next = ["", "", "", "", "", ""];
      chars.forEach((c, j) => (next[j] = c));
      setOtp(next);
      refs.current[Math.min(chars.length, 6) - 1]?.focus();
      return;
    }
    const next = [...otp]; next[i] = val; setOtp(next);
    if (val && i < 5) refs.current[i + 1]?.focus();
  }
  function key(i, e) {
    if (e.key === "Backspace" && !otp[i] && i > 0) {
      const next = [...otp]; next[i - 1] = ""; setOtp(next); refs.current[i - 1]?.focus();
    }
  }
  function verify() { setVerifying(true); setTimeout(onNext, 850); }

  return (
    <div className="screen authpad">
      <button className="back" onClick={onBack}><ChevronLeft size={20} /></button>
      <div className="auth-head">
        <div className="tile tile-green" style={{ marginBottom: 16 }}><ShieldCheck size={26} /></div>
        <h1 className="h1">Verify your number</h1>
        <p className="lead">Enter the code sent to <b style={{ color: "var(--ink)" }}>{display}</b></p>
      </div>
      <div className="otp-row">
        {otp.map((d, i) => (
          <input
            key={i} ref={(el) => (refs.current[i] = el)} className={"otp-box" + (d ? " filled" : "")}
            inputMode="numeric" size={1} maxLength={1} value={d} autoFocus={i === 0}
            onChange={(e) => change(i, e.target.value)} onKeyDown={(e) => key(i, e)}
          />
        ))}
      </div>
      <p className="muted" style={{ fontSize: 13, marginTop: 18 }}>
        {seconds > 0
          ? <>Resend code in <b style={{ color: "var(--ink)" }}>0:{String(seconds).padStart(2, "0")}</b></>
          : <span style={{ color: "var(--green-ink)", fontWeight: 600, cursor: "pointer" }} onClick={() => setSeconds(30)}>Resend code</span>}
      </p>
      <div className="auth-foot">
        <button className="btn btn-primary" disabled={!filled || verifying} onClick={verify}>
          {verifying ? <><Loader2 size={18} className="spin" style={{ animation: "spin 1s linear infinite" }} /> Verifying…</> : "Verify & continue"}
        </button>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

  function pick(e) {

    const r = new FileReader(); r.onload = () => setProfile((p) => ({ ...p, photo: r.result })); r.readAsDataURL(f);

    <div className="screen authpad">

          <span className="lead-ic"><Building2 size={18} /></span>
          <input className="input" placeholder="e.g. Raza Estate & Builders" value={profile.agency}

  return (

      <div className="topbar">

      </div>

      <div className="pc-body" key={tab} style={tab === "maps" ? { overflow: "hidden", display: "flex", flexDirection: "column" } : undefined}>
        {tab === "maps" ? (
          <MapsView listings={listings} profile={profile} onOpen={onOpenListing} onCall={onCallListing} focusId={mapFocusId} onFocusConsumed={onMapFocusConsumed} />
        ) : (
          <div className="screen" style={{ minHeight: "auto" }}>
            {tab === "chats" ? <ChatsTab />

              : tab === "tools" ? <Estimator />

      </div>

      <nav className="nav">
        {NAV.map((n) => {
          const Ic = n.icon; const active = tab === n.id;
          return (
            <button key={n.id} className={"nav-item" + (active ? " active" : "")} onClick={() => setTab(n.id)}>
              <span className="nic"><Ic size={21} strokeWidth={active ? 2.4 : 2} /></span>
              {n.label}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

const PALETTE = ["#0B5A43", "#9A6A3A", "#3E5C6B", "#6B4E7A", "#8A5A4A", "#4A6B4A", "#7A6A3A"];
function pickColor(s) { let h = 0; for (const c of s) h = (h * 31 + c.charCodeAt(0)) >>> 0; return PALETTE[h % PALETTE.length]; }
function initials(name) { return (name || "").trim().split(/\s+/).map((w) => w[0]).slice(0, 2).join("").toUpperCase() || "?"; }
function groupInitials(name) { const w = (name || "").replace(/[—–-]/g, " ").trim().split(/\s+/).filter(Boolean); return (w.slice(0, 2).map((x) => x[0]).join("") || "G").toUpperCase(); }
function nowTime() { const d = new Date(); let h = d.getHours(); const m = String(d.getMinutes()).padStart(2, "0"); const ap = h >= 12 ? "PM" : "AM"; h = h % 12 || 12; return `${h}:${m} ${ap}`; }
function getSender(id, profile) {
  if (id === "me") return { name: profile?.name ? profile.name : "You", first: "You", color: "#0B5A43", photo: profile?.photo, isMe: true, agency: profile?.agency, phone: profile?.phone };
  const b = BROKERS.find((x) => x.id === id);
  if (!b) return { name: "Unknown", first: "Unknown", color: "#888", photo: null, isMe: false };
  return { name: b.name, first: b.name.split(" ")[0], color: b.color, photo: null, isMe: false, agency: b.agency, phone: b.phone };
}
function brokerCallTarget(b) { return { name: b.name, sub: b.agency, color: b.color, initials: initials(b.name), photo: null, brokerId: b.id }; }
function groupCallTarget(g) { return { name: g.name, sub: `${g.members.length} participants`, color: g.color, initials: groupInitials(g.name), photo: null, isGroup: true, groupId: g.id }; }

/* ---------- Conversation ---------- */
function Conversation({ group, profile, onBack, onInfo, onCall, onSend, onSendAttach, onToggleMute, onClearChat, onOpenListing, listings, toast }) {
  const [text, setText] = useState("");
  const [menuOpen, setMenuOpen] = useState(false);
  const [attachOpen, setAttachOpen] = useState(false);
  const [searching, setSearching] = useState(false);
  const [query, setQuery] = useState("");
  const [contactOpen, setContactOpen] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const ref = useRef();
  const photoRef = useRef(), videoRef = useRef(), fileRef = useRef();
  const isDM = !!group.dm;
  const peer = isDM ? getSender(group.peerId, profile) : null;
  const about = group.aboutListingId ? listings.find((l) => l.id === group.aboutListingId) : null;
  const aboutTitle = about ? `${capSize(about.sizeText || "")} ${about.kind === "house" ? "House" : "Plot"}${about.phase ? " · " + about.phase : ""}${about.priceText ? " · PKR " + about.priceText : ""}` : "";

  useEffect(() => { const el = ref.current; if (el) el.scrollTop = el.scrollHeight; }, [group.messages.length, group.id]);
  function submit() { const t = text.trim(); if (!t) return; onSend(group.id, t); setText(""); }
  const subList = isDM ? (peer.agency || "Private chat") : group.members.map((id) => getSender(id, profile).first).slice(0, 4).join(", ");

  function pickFiles(kind, fileList) {
    const files = Array.from(fileList || []);
    files.forEach((f) => {
      if (kind === "image" || kind === "video") { const r = new FileReader(); r.onload = () => onSendAttach(group.id, { type: kind, url: r.result, name: f.name }); r.readAsDataURL(f); }
      else onSendAttach(group.id, { type: "file", name: f.name, size: f.size });
    });
    setAttachOpen(false);
  }
  function shareLocation() { onSendAttach(group.id, { type: "location", area: "DHA Phase 6, " + (profile.city || "Lahore") }); setAttachOpen(false); }

  const shownMsgs = searching && query.trim() ? group.messages.filter((m) => (m.text || "").toLowerCase().includes(query.trim().toLowerCase())) : group.messages;
  const bareBtn = { background: "transparent", border: 0, cursor: "pointer", color: "var(--ink-soft)", display: "flex", padding: 2 };

  return (
    <div className="chat-panel">
      <div className="conv-head">
        <button onClick={onBack} style={{ background: "transparent", border: 0, width: 38, height: 40, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "var(--ink)" }}><ChevronLeft size={24} /></button>
        {searching ? (
          <div className="csearch"><Search size={17} color="var(--ink-soft)" /><input autoFocus placeholder="Search in chat" value={query} onChange={(e) => setQuery(e.target.value)} /><button style={bareBtn} onClick={() => { setSearching(false); setQuery(""); }}><X size={18} /></button></div>
        ) : (
          <>
            <div className={"av " + (isDM ? "av-rd" : "av-sq")} style={{ background: isDM ? peer.color : group.color }} onClick={isDM ? () => setContactOpen(true) : onInfo}>{isDM ? initials(peer.name) : groupInitials(group.name)}</div>
            <div className="conv-title" onClick={isDM ? () => setContactOpen(true) : onInfo}>
              <div className="nm">{isDM ? peer.name : group.name}{group.muted && <span className="mute-ic"><BellOff size={13} /></span>}</div>
              <div className="sub">{subList}{!isDM && group.members.length > 4 ? `  +${group.members.length - 4}` : ""}</div>
            </div>
            <button className="icon-btn" style={{ width: 40, height: 40 }} onClick={onCall}><Phone size={18} /></button>
            <button className="icon-btn" style={{ width: 40, height: 40 }} onClick={() => setMenuOpen((o) => !o)}><MoreVertical size={18} /></button>
          </>
        )}
        {menuOpen && (<>
          <div className="menu-scrim" onClick={() => setMenuOpen(false)} />
          <div className="menu-pop">
            {!isDM ? <button onClick={() => { setMenuOpen(false); onInfo(); }}><Info size={17} /> Group info</button>
                   : <button onClick={() => { setMenuOpen(false); setContactOpen(true); }}><User size={17} /> View contact</button>}
            <button onClick={() => { setMenuOpen(false); setSearching(true); }}><Search size={17} /> Search</button>
            <button onClick={() => { setMenuOpen(false); onToggleMute(group.id); toast(group.muted ? "Notifications unmuted" : "Notifications muted"); }}>{group.muted ? <Bell size={17} /> : <BellOff size={17} />} {group.muted ? "Unmute" : "Mute notifications"}</button>
            <button className="danger" onClick={() => { setMenuOpen(false); setConfirmClear(true); }}><Trash2 size={17} /> Clear chat</button>
          </div>
        </>)}
      </div>

      {!isDM && <div className="conv-banner"><span className="gd" /> Auto-listing on · property messages here become live listings</div>}
      {isDM && about && (
        <div className="about-chip" onClick={() => onOpenListing(about.id)}>
          {about.photos && about.photos.length ? <img src={about.photos[0]} alt="" style={{ width: 40, height: 40, borderRadius: 9, objectFit: "cover", flex: "0 0 auto" }} /> : <span style={{ width: 40, height: 40, borderRadius: 9, background: "var(--green)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flex: "0 0 auto" }}><Tag size={17} /></span>}
          <div style={{ flex: 1, minWidth: 0 }}><div className="ac-t">About this listing</div><div className="ac-m" style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{aboutTitle}</div></div>
          <ChevronRight size={18} color="var(--ink-faint)" />
        </div>
      )}

      <div className="msgs" ref={ref}>
        {!searching && shownMsgs.length > 0 && <div className="daysep">Today</div>}
        {searching && shownMsgs.length === 0 && <div className="muted" style={{ textAlign: "center", fontSize: 13, marginTop: 24 }}>No messages match “{query}”.</div>}
        {!searching && shownMsgs.length === 0 && <div className="muted" style={{ textAlign: "center", fontSize: 13, marginTop: 28 }}>No messages yet. Say hello 👋</div>}
        {shownMsgs.map((m, i) => {
          const s = getSender(m.senderId, profile);
          const prev = shownMsgs[i - 1];
          const showName = !s.isMe && !isDM && (!prev || prev.senderId !== m.senderId);
          return (
            <div className={"row" + (s.isMe ? " me" : "")} key={m.id}>
              <div className={"bub " + (s.isMe ? "out" : "in")}>
                {showName && <div className="snd" style={{ color: s.color }}>{s.name}</div>}
                {m.attach && <AttachView attach={m.attach} />}
                {m.text && <div className="txt">{m.text}</div>}
                <div className="tm">{m.time}{s.isMe && <Check size={12} strokeWidth={3} style={{ display: "inline", verticalAlign: "-2px", marginLeft: 3 }} />}</div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="composer">
        <button className="attach" onClick={() => setAttachOpen((o) => !o)}><Paperclip size={19} /></button>
        <textarea className="cin" rows={1} placeholder="Message" value={text}
          onChange={(e) => setText(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); } }} />
        <button className="send-btn" disabled={!text.trim()} onClick={submit}><Send size={18} /></button>
        {attachOpen && (<>
          <div className="menu-scrim" onClick={() => setAttachOpen(false)} />
          <div className="attach-pop">
            <button className="att-opt" onClick={() => photoRef.current?.click()}><span className="att-ic" style={{ background: "#2E7D5B" }}><ImageIcon size={20} /></span>Photos</button>
            <button className="att-opt" onClick={() => videoRef.current?.click()}><span className="att-ic" style={{ background: "#9A6A3A" }}><Film size={20} /></span>Videos</button>
            <button className="att-opt" onClick={() => fileRef.current?.click()}><span className="att-ic" style={{ background: "#3E5C6B" }}><FileText size={20} /></span>Files</button>
            <button className="att-opt" onClick={shareLocation}><span className="att-ic" style={{ background: "#6B4E7A" }}><Navigation size={20} /></span>Location</button>
          </div>
        </>)}
        <input ref={photoRef} type="file" accept="image/*" multiple hidden onChange={(e) => pickFiles("image", e.target.files)} />
        <input ref={videoRef} type="file" accept="video/*" hidden onChange={(e) => pickFiles("video", e.target.files)} />
        <input ref={fileRef} type="file" hidden onChange={(e) => pickFiles("file", e.target.files)} />
      </div>

      {contactOpen && peer && (
        <div className="sheet-scrim" onClick={() => setContactOpen(false)}>
          <div className="sheet-card" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-grip" />
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div className="av av-rd" style={{ background: peer.color, width: 56, height: 56, fontSize: 21 }}>{initials(peer.name)}</div>
              <div><div style={{ fontSize: 18, fontWeight: 700, color: "var(--ink)" }}>{peer.name}</div><div className="muted" style={{ fontSize: 13 }}>{peer.agency}</div></div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 9, fontSize: 14, color: "var(--ink)", marginTop: 16 }}><Phone size={16} color="var(--ink-soft)" /> +92 {peer.phone}</div>
            <button className="btn btn-primary" style={{ marginTop: 18 }} onClick={() => { setContactOpen(false); onCall(); }}><Phone size={18} /> Call {peer.first}</button>
          </div>
        </div>
      )}

      {confirmClear && (
        <div className="sheet-scrim" onClick={() => setConfirmClear(false)}>
          <div className="sheet-card" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-grip" />
            <div style={{ fontSize: 17, fontWeight: 700, color: "var(--ink)" }}>Clear this chat?</div>
            <p className="muted" style={{ fontSize: 13.5, marginTop: 6, lineHeight: 1.5 }}>All messages in this conversation will be removed. This can’t be undone.</p>
            <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
              <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setConfirmClear(false)}>Cancel</button>
              <button className="btn btn-primary" style={{ flex: 1, background: "var(--danger)" }} onClick={() => { onClearChat(group.id); setConfirmClear(false); }}>Clear chat</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- Part 3: property message parser ---------- */
function num(x) { return parseFloat(x); }
function trimNum(n) { return parseFloat(n.toFixed(2)).toString(); }
function fmtPrice(v) { const cr = v / 1e7; if (cr >= 1) return { n: trimNum(cr), u: "cr" }; const l = v / 1e5; return { n: trimNum(l), u: "lakh" }; }
function capSize(s) { return (s || "").replace(/marla/gi, "Marla").replace(/kanal/gi, "Kanal"); }
function ago(ts) { const s = (Date.now() - ts) / 1000; if (s < 60) return "Just now"; const m = s / 60; if (m < 60) return Math.floor(m) + "m ago"; const h = m / 60; if (h < 24) return Math.floor(h) + "h ago"; const d = h / 24; if (d < 7) return Math.floor(d) + "d ago"; return Math.floor(d / 7) + "w ago"; }
function fmtDur(s) { const m = Math.floor(s / 60), ss = String(s % 60).padStart(2, "0"); return `${m}:${ss}`; }
function fmtBytes(b) { if (!b) return ""; const u = ["B", "KB", "MB", "GB"]; let i = 0, n = b; while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; } return n.toFixed(n < 10 && i > 0 ? 1 : 0) + " " + u[i]; }
function attachPreview(a) { return a.type === "image" ? "📷 Photo" : a.type === "video" ? "🎬 Video" : a.type === "location" ? "📍 Location" : "📄 " + (a.name || "File"); }
function AttachView({ attach }) {
  if (attach.type === "image") return <img className="bub-img" src={attach.url} alt="" />;
  if (attach.type === "video") return <video className="bub-vid" src={attach.url} controls preload="metadata" />;

  );
  if (attach.type === "location") return (

function parsePriceFrom(text) {
  const t = text.toLowerCase();
  let m = t.match(/(\d+(?:\.\d+)?)\s*(crore|crores|cr|kror|karor)\b/);
  if (m) return num(m[1]) * 1e7;
  m = t.match(/(\d+(?:\.\d+)?)\s*(lakh|lakhs|lac|lacs|lk)\b/);
  if (m) return num(m[1]) * 1e5;
  return null;
}
function parseSizeFrom(text) {
  const t = text.toLowerCase();
  let marla = 0; const parts = [];
  const k = t.match(/(\d+(?:\.\d+)?)\s*kanal/);
  if (k) { const n = num(k[1]); marla += n * 20; parts.push(n + " kanal"); }
  const ma = t.match(/(\d+(?:\.\d+)?)\s*marla/);
  if (ma) { const n = num(ma[1]); marla += n; parts.push(n + " marla"); }
  if (marla === 0) return null;
  return { marla, text: parts.join(" ") };
}
function hasPrice(l) { return parsePriceFrom(l) != null; }
function hasSize(l) { return parseSizeFrom(l) != null; }
function hasPhase(l) { return /phase\s*\d+/i.test(l); }

const SOCIETIES = [["lake city", "Lake City"], ["state life", "State Life"], ["bahria", "Bahria Town"], ["wapda town", "Wapda Town"], ["valencia", "Valencia"]];
function detectSociety(text) { const t = text.toLowerCase(); for (const [k, v] of SOCIETIES) if (t.includes(k)) return v; return "DHA Lahore"; }

function parseChunk(chunk) {
  const t = chunk.toLowerCase();
  const size = parseSizeFrom(chunk);
  const price = parsePriceFrom(chunk);
  const phMatch = /phase\s*(\d+)/i.exec(chunk);
  let phase = phMatch ? "Phase " + phMatch[1] : null;
  if (!phase) { const sec = chunk.match(/sector\s*([a-z]?-?\d+|[a-z]{1,2})\b/i); if (sec) phase = "Sector " + sec[1].toUpperCase(); }
  if (!price && !(size && phase)) return null;
  const kind = /\b(house|kothi|home|bungalow|villa|portion|flat|apartment)\b/i.test(chunk) ? "house" : "plot";
  const wanted = /\b(need|needed|looking for|require[d]?|wanted)\b/i.test(chunk);
  let block = null;
  const bm = chunk.match(/block[-\s]*([a-z]{1,2}\d?)/i) || chunk.match(/\b([a-z]{1,2})[-\s]*block\b/i);
  if (bm) block = "Block " + bm[1].toUpperCase();
  let plot = null;
  const pm = chunk.match(/plot\s*#?\s*([0-9]+[-]?[a-z]?)/i);
  if (pm) plot = pm[1].toUpperCase();
  let beds = null; const bd = chunk.match(/(\d+)\s*(bed|beds|bedroom|bedrooms|bhk)\b/i); if (bd) beds = num(bd[1]);
  if (!block && phMatch) { const lone = chunk.match(/\b([A-Z])\b/g); if (lone) { const cand = lone.find((x) => !["I", "A"].includes(x)); if (cand) block = "Block " + cand; } }
  if (!plot) {
    const scrub = chunk
      .replace(/(\d+(?:\.\d+)?)\s*(crore|crores|cr|kror|karor|lakh|lakhs|lac|lacs|lk)\b/ig, " ")
      .replace(/(\d+(?:\.\d+)?)\s*(kanal|marla)\b/ig, " ")
      .replace(/phase\s*\d+/ig, " ")
      .replace(/(\d+)\s*(bed|beds|bedroom|bedrooms|bhk)\b/ig, " ");
    const bn = scrub.match(/\b(\d{2,4})\b/);
    if (bn) plot = bn[1];
  }
  const featMap = [["corner", "Corner"], ["facing park", "Park facing"], ["park facing", "Park facing"], ["near park", "Near park"], ["main road", "Main road"], ["main double road", "Main road"], ["boulevard", "Boulevard"], ["basement", "Basement"], ["furnished", "Furnished"], ["brand new", "Brand new"], ["possession", "Possession"], ["ideal", "Ideal location"], ["near masjid", "Near mosque"], ["near mosque", "Near mosque"]];
  const feats = []; featMap.forEach(([k2, v]) => { if (t.includes(k2) && !feats.includes(v)) feats.push(v); });
  const pf = price ? fmtPrice(price) : null;
  return {
    kind, intent: wanted ? "wanted" : "sale", society: detectSociety(chunk),
    phase, block, plotNo: plot, sizeText: size ? size.text : null, sizeMarla: size ? size.marla : null,
    price, priceText: pf ? pf.n + " " + pf.u : null, bedrooms: beds, features: feats,
  };
}
function expandChunks(chunks) {
  const out = [];
  for (const c of chunks) {
    const prices = (c.toLowerCase().match(/(\d+(?:\.\d+)?)\s*(crore|cr|kror|karor|lakh|lakhs|lac|lacs|lk)\b/g) || []).length;
    const phases = (c.match(/phase\s*\d+/ig) || []).length;
    if (prices >= 2 && phases >= 2) {
      c.split(/(?=phase\s*\d+)/i).map((s) => s.trim()).filter(Boolean).forEach((s) => out.push(s));
    } else out.push(c);
  }
  return out;
}
function parseMessage(text) {
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
  const complete = lines.filter((l) => hasPrice(l) && (hasSize(l) || hasPhase(l)));
  let chunks = complete.length >= 2 ? complete : [lines.join(" ")];
  chunks = expandChunks(chunks);
  const res = [];
  for (const c of chunks) { const p = parseChunk(c); if (p) res.push(p); }
  return res;
}
function listingKey(L) {
  const base = `${L.kind}|${L.phase || ""}|${L.block || ""}|${L.sizeMarla || ""}`;
  if (L.intent === "wanted") return "w|" + base;
  return L.plotNo ? "s|" + base + "|" + L.plotNo : "s|" + base + "|" + (L.id || Math.random());
}
function matchesWanted(w, s) {
  if (!w.phase || !w.sizeMarla) return false;
  return s.kind === w.kind && s.phase === w.phase && s.sizeMarla === w.sizeMarla && (!w.block || s.block === w.block);
}
function buildSeedListings(groups) {
  const out = []; let k = 0;
  groups.forEach((g) => {
    g.messages.forEach((m) => {
      parseMessage(m.text).forEach((p, idx) => {
        const item = { ...p, id: `L_${g.id}_${m.id}_${idx}`, ownerId: m.senderId, sourceGroupId: g.id, sourceMsgId: m.id, raw: m.text, photos: [], ts: Date.now() - (++k) * 70 * 60000 };
        const key = listingKey(item);
        const exIdx = out.findIndex((l) => listingKey(l) === key);
        if (p.intent === "wanted") {
          if (exIdx >= 0) { if (!out[exIdx].interested.includes(m.senderId)) out[exIdx].interested.push(m.senderId); }
          else out.push({ ...item, interested: [m.senderId] });
        } else {
          if (exIdx < 0) out.push({ ...item, interested: [] });
        }
      });
    });
  });
  return out.sort((a, b) => b.ts - a.ts);
}

/* ---------- Part 4: market analytics ---------- */
function avgArr(a) { return a.length ? a.reduce((x, y) => x + y, 0) / a.length : 0; }
function fmtPKR(v) { if (!v) return "—"; if (v >= 1e7) return trimNum(v / 1e7) + " cr"; if (v >= 1e5) return trimNum(v / 1e5) + " lakh"; if (v >= 1e3) return Math.round(v / 1e3) + "k"; return "" + Math.round(v); }
function sizeLabel(marla) { if (marla === 5) return "5 Marla"; if (marla === 10) return "10 Marla"; if (marla % 20 === 0) return (marla / 20) + " Kanal"; return marla + " Marla"; }
function phaseSortKey(p) { const m = /(\d+)/.exec(p); return m ? +m[1] : 99; }
function parseSizeOrder(label) { const m = /([\d.]+)\s*(Kanal|Marla)/i.exec(label); if (!m) return 999; const n = +m[1]; return /kanal/i.test(m[2]) ? n * 20 : n; }
function lastMonths(n) { const out = []; const d = new Date(); for (let i = n - 1; i >= 0; i--) { const dd = new Date(d.getFullYear(), d.getMonth() - i, 1); out.push(dd.toLocaleString("en", { month: "short" })); } return out; }

function shortLabel(k, mode) {
  if (mode === "society") return k.replace(" Lahore", "").replace(" Town", "").replace(" City", "").replace(" Life", "");
  return k.replace("Phase ", "P").replace("Sector ", "");
}
function computeAnalytics(listings, society, area) {
  const all = listings;
  const bySoc = society === "all" ? all : all.filter((l) => l.society === society);
  const scope = area === "all" ? bySoc : bySoc.filter((l) => l.phase === area);
  const sale = scope.filter((l) => l.intent === "sale");
  const plots = sale.filter((l) => l.kind === "plot");
  const houses = sale.filter((l) => l.kind === "house");
  const wanted = scope.filter((l) => l.intent === "wanted");
  const ppmVals = plots.filter((l) => l.price && l.sizeMarla).map((l) => l.price / l.sizeMarla);
  const avgPlotPpm = avgArr(ppmVals);
  const minPpm = ppmVals.length ? Math.min(...ppmVals) : 0;
  const maxPpm = ppmVals.length ? Math.max(...ppmVals) : 0;
  const avgHouse = avgArr(houses.filter((l) => l.price).map((l) => l.price));

  const societies = [...new Set(all.filter((l) => l.intent === "sale").map((l) => l.society))].sort();
  const areas = [...new Set(bySoc.filter((l) => l.intent === "sale" && l.phase).map((l) => l.phase))].sort((a, b) => phaseSortKey(a) - phaseSortKey(b));

  const groupMode = society === "all" ? "society" : "area";
  const keys = groupMode === "society" ? societies : areas;
  const srcOf = (k) => (groupMode === "society" ? all.filter((l) => l.society === k) : bySoc.filter((l) => l.phase === k));
  const groups = keys.map((k) => {
    const pl = srcOf(k).filter((l) => l.intent === "sale" && l.kind === "plot" && l.price && l.sizeMarla);
    return { label: shortLabel(k, groupMode), full: k, value: Math.round(avgArr(pl.map((l) => l.price / l.sizeMarla))) };
  });
  const table = keys.map((k) => {
    const src = srcOf(k);
    const pl = src.filter((l) => l.intent === "sale" && l.kind === "plot" && l.price && l.sizeMarla);
    const h = src.filter((l) => l.intent === "sale" && l.kind === "house" && l.price);
    return { label: k, ppm: avgArr(pl.map((l) => l.price / l.sizeMarla)), h10: avgArr(h.filter((l) => l.sizeMarla === 10).map((l) => l.price)), h20: avgArr(h.filter((l) => l.sizeMarla === 20).map((l) => l.price)) };
  });

  const split = [{ name: "Plots", value: plots.length }, { name: "Houses", value: houses.length }, { name: "Wanted", value: wanted.length }];

  const sizeMap = {};
  sale.forEach((l) => { if (l.sizeMarla) { const k = sizeLabel(l.sizeMarla); sizeMap[k] = (sizeMap[k] || 0) + 1; } });
  const sizeDist = Object.entries(sizeMap).map(([label, count]) => ({ label, count })).sort((a, b) => parseSizeOrder(a.label) - parseSizeOrder(b.label));

  const blockMap = {};
  sale.forEach((l) => { if (l.block) { const k = `${l.phase} · ${l.block}`; blockMap[k] = (blockMap[k] || 0) + 1; } });
  const hot = Object.entries(blockMap).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count).slice(0, 5);
  const hotMax = hot.length ? hot[0].count : 1;

  const anchor = avgPlotPpm || avgArr(bySoc.filter((l) => l.intent === "sale" && l.kind === "plot" && l.price && l.sizeMarla).map((l) => l.price / l.sizeMarla)) || 2000000;
  const factors = [0.86, 0.89, 0.92, 0.95, 0.98, 1.0];
  const trend = lastMonths(6).map((m, i) => ({ m, value: Math.round(anchor * factors[i]) }));

  return { scope, sale, plots, houses, wanted, avgPlotPpm, minPpm, maxPpm, avgHouse, societies, areas, groupMode, groups, split, sizeDist, table, hot, hotMax, trend };
}

const CHT = { green: "#0B5A43", greenSoft: "#CBDDD4", gold: "#A98A57", slate: "#3E5C6B", grid: "#EEEAE2", ink: "#6C685E", faint: "#A6A197" };
const TIP = { background: "#1C1B16", border: "none", borderRadius: 10, color: "#fff", fontSize: 12, padding: "8px 10px", boxShadow: "0 8px 24px rgba(0,0,0,.18)" };

function MarketAnalytics({ listings, onShowWanted }) {

          {areaChips.map((c) => <button key={c.id} className={"fchip" + (area === c.id ? " on" : "")} onClick={() => setArea(c.id)}>{c.label}</button>)}

      <div className="stat-grid" style={{ marginTop: 6 }}>

        <div className="stat"><div className="sl"><Ruler size={13} /> Avg plot rate</div><div className="sv">{fmtPKR(a.avgPlotPpm)}<span className="u">/marla</span></div><div className="sd" style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{scopeLabel}</div></div>
        <div className="stat"><div className="sl"><Building2 size={13} /> Avg house</div><div className="sv">{a.avgHouse ? "PKR " + fmtPKR(a.avgHouse) : "—"}</div><div className="sd">{a.houses.length} sampled</div></div>
        <div className="stat stat-link" role="button" onClick={onShowWanted}><div className="sl"><TrendingUp size={13} /> Buyer demand</div><div className="sv">{a.wanted.length}<span className="u">wanted</span></div><div className="sd" style={{ display: "flex", alignItems: "center", gap: 3 }}>View wanted <ChevronRight size={12} /></div></div>
      </div>

      {a.minPpm > 0 && <p className="muted" style={{ fontSize: 11.5, padding: "11px 18px 0", margin: 0, lineHeight: 1.45 }}>Plot rates range <b style={{ color: "var(--ink)" }}>{fmtPKR(a.minPpm)}–{fmtPKR(a.maxPpm)}/marla</b> in {scopeLabel}.</p>}

      <div className="acard">
        <div className="acard-h"><span className="acard-t">{a.groupMode === "society" ? "Plot rate by society" : "Plot rate by area"}</span><span className="acard-s">PKR / marla</span></div>
        <div className="chart-wrap">
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={a.groups} margin={{ top: 6, right: 6, left: 4, bottom: 0 }}>
              <CartesianGrid vertical={false} stroke={CHT.grid} />
              <XAxis dataKey="label" tick={{ fontSize: 10.5, fill: CHT.ink }} axisLine={false} tickLine={false} interval={0} />
              <YAxis tickFormatter={(v) => Math.round(v / 1e5) + "L"} tick={{ fontSize: 10, fill: CHT.faint }} axisLine={false} tickLine={false} width={38} />
              <Tooltip cursor={{ fill: "rgba(11,90,67,.06)" }} contentStyle={TIP} labelStyle={{ color: "#fff" }} formatter={(v) => [fmtPKR(v) + "/marla", "Rate"]} />
              <Bar dataKey="value" radius={[6, 6, 0, 0]} maxBarSize={46}>
                {a.groups.map((d, i) => <Cell key={i} fill={barFill(d)} />)}
              </Bar>

      </div>

      <div className="acard">

              <Tooltip contentStyle={TIP} formatter={(v) => [fmtPKR(v) + "/marla", "Avg rate"]} />
              <Area dataKey="value" stroke={CHT.green} strokeWidth={2.4} fill="url(#tg)" />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      <div className="acard">
        <div className="acard-h"><span className="acard-t">{a.groupMode === "society" ? "Society breakdown" : "Area breakdown"}</span><span className="acard-s">avg rates</span></div>
        <table className="atable">
          <thead><tr><th>{a.groupMode === "society" ? "Society" : "Area"}</th><th>Plot/marla</th><th>10M house</th><th>1K house</th></tr></thead>
          <tbody>
            {a.table.map((r, i) => (
              <tr key={i}>
                <td>{r.label}</td>

                <td>{r.h10 ? fmtPKR(r.h10) : <span className="muted">—</span>}</td>
                <td>{r.h20 ? fmtPKR(r.h20) : <span className="muted">—</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {a.hot.length > 0 && (
        <div className="acard">
          <div className="acard-h"><span className="acard-t">Most active blocks</span><span className="acard-s">{scopeLabel}</span></div>
          {a.hot.map((h, i) => (
            <div className="hotrow" key={i}>

          ))}
        </div>
      )}

      <div className="acard" style={{ marginBottom: 6 }}>
        <div className="acard-h"><span className="acard-t">Demand signal</span></div>
        {(() => {
          const av = a.sale.length, wd = a.wanted.length, tot = Math.max(av + wd, 1);
          return (
            <>
              <div className="demand-bar">
                <div className="seg" style={{ width: (av / tot * 100) + "%", background: CHT.green }}>{av} available</div>

              </div>
              <div className="demand-note">{wd === 0 ? "No open buyer requests in this scope yet." : `${wd} active buyer ${wd > 1 ? "requests" : "request"} against ${av} available ${av > 1 ? "listings" : "listing"} — ${wd / Math.max(av, 1) >= 0.4 ? "demand is running hot" : "supply is comfortable"}.`}</div>
            </>
          );
        })()}
      </div>
      <div style={{ height: 6 }} />
    </div>
  );
}
