];
const DEPTHS = [{ id: "std", label: "3–4 ft" }, { id: "mid", label: "4–5 ft" }, { id: "deep", label: "5–7 ft" }];
const FLOORS = [{ id: "single", label: "Single + Mumty" }, { id: "double", label: "Double + Mumty" }];
const BASE = [{ id: "none", label: "None" }, { id: "half", label: "Half" }, { id: "full", label: "Full" }];
const BD_COLORS = ["#0B5A43", "#A98A57", "#3E5C6B", "#8FB3A4", "#6B4E7A"];

function Seg({ options, value, onChange }) {
  return <div className="seg-ctl">{options.map((o) => <button key={o.id} className={"seg-opt" + (value === o.id ? " on" : "")} onClick={() => onChange(o.id)}>{o.label}</button>)}</div>;
}

function Estimator() {
  const [pkg, setPkg] = useState("basic");
  const [plotId, setPlotId] = useState("10m");
  const [floors, setFloors] = useState("single");
  const [basement, setBasement] = useState("none");
  const [depth, setDepth] = useState("std");
  const plot = PLOTS.find((p) => p.id === plotId);
  const [ground, setGround] = useState(plot.perFloor);
  const [first, setFirst] = useState(plot.perFloor);
  const [mumty, setMumty] = useState(plot.mumty);
  const [bArea, setBArea] = useState(0);

  useEffect(() => {
    const pl = PLOTS.find((p) => p.id === plotId);
    setGround(pl.perFloor); setFirst(pl.perFloor); setMumty(pl.mumty);
    setBArea(basement === "full" ? pl.perFloor : basement === "half" ? Math.round(pl.perFloor / 2) : 0);
  }, [plotId, basement]);

  const P = PACKAGES.find((x) => x.id === pkg);
  const depthFactor = depth === "std" ? 1 : depth === "mid" ? 1.04 : 1.08;
  const firstArea = floors === "double" ? (+first || 0) : 0;
  const normal = (+ground || 0) + firstArea + (+mumty || 0);
  const basementArea = basement !== "none" ? (+bArea || 0) : 0;
  const covered = normal + basementArea;
  const total = Math.round((normal * P.rate + basementArea * P.rate * 1.2) * depthFactor);
  const breakdown = P.split.map(([label, pct]) => ({ label, amount: Math.round(total * pct), pct }));

  function numInput(label, val, set) {
    return (
      <div className="numf">
        <span className="nlab">{label}</span>
        <div className="nbox">
          <input inputMode="numeric" value={val} onChange={(e) => { const v = e.target.value.replace(/\D/g, ""); set(v === "" ? 0 : parseInt(v, 10)); }} />
          <span className="suf">sq ft</span>
        </div>
      </div>
    );
  }

  return (
    <div className="feed">
      <div style={{ padding: "16px 18px 0" }}>
        <h2 className="page-title">Construction estimator</h2>
        <p className="muted" style={{ fontSize: 12.5, marginTop: 3 }}>Instant build cost with A+ materials</p>
      </div>

      <div style={{ padding: "0 18px" }}>
        <div className="fg">
          <label className="fg-l">Package</label>
          <div className="sel-wrap">
            <select className="sel" value={pkg} onChange={(e) => setPkg(e.target.value)}>
              {PACKAGES.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
            <ChevronDown size={18} className="chev" />
          </div>
        </div>

        <div className="fg">
          <label className="fg-l">Plot size</label>
          <div className="chips-scroll" style={{ padding: 0, margin: "0 -2px" }}>
            {PLOTS.map((p) => <button key={p.id} className={"fchip" + (plotId === p.id ? " on" : "")} onClick={() => setPlotId(p.id)}>{p.label}</button>)}
          </div>
        </div>

        <div className="fg"><label className="fg-l">Floors</label><Seg options={FLOORS} value={floors} onChange={setFloors} /></div>
        <div className="fg"><label className="fg-l">Basement</label><Seg options={BASE} value={basement} onChange={setBasement} /></div>
        <div className="fg"><label className="fg-l">Foundation depth</label><Seg options={DEPTHS} value={depth} onChange={setDepth} /></div>

        <div className="fg">
          <label className="fg-l">Covered area</label>
          <div className="num-grid">
            {numInput("Ground floor", ground, setGround)}
            {floors === "double" && numInput("First floor", first, setFirst)}
            {numInput("Mumty", mumty, setMumty)}
            {basement !== "none" && numInput("Basement", bArea, setBArea)}
          </div>
        </div>
      </div>

      <div className="est-result">
        <div className="el">Estimated cost</div>
        <div className="est-total">PKR {fmtPKR(total)}</div>
        <div className="est-sub">≈ Rs {total.toLocaleString("en-PK")}</div>
        <div className="est-meta">{covered.toLocaleString("en-PK")} sq ft covered · ~PKR {P.rate.toLocaleString("en-PK")}/sq ft</div>
        <div className="est-chips">
          <span className="est-chip"><Clock size={13} /> {plot.timeline}{floors === "double" ? " +" : ""}</span>
          <span className="est-chip"><Hammer size={13} /> {P.scope}</span>
        </div>
      </div>

      <div className="acard">
        <div className="acard-h"><span className="acard-t">Cost breakdown</span><span className="acard-s">{P.name}</span></div>
        {breakdown.map((b, i) => (
          <div className="bd-row" key={i}>
            <div className="bd-top"><span className="bl">{b.label}</span><span className="ba">PKR {fmtPKR(b.amount)}</span></div>
            <div className="bd-bar"><i style={{ width: (b.pct * 100) + "%", background: BD_COLORS[i % BD_COLORS.length] }} /></div>
          </div>
        ))}
      </div>

      <div className="acard">
        <div className="acard-h"><span className="acard-t">What's included</span><span className="acard-s">A+ materials</span></div>
        <div className="inc-list">{P.materials.map((m, i) => <div className="inc-item" key={i}><span className="ck"><Check size={12} strokeWidth={3} /></span>{m}</div>)}</div>
      </div>

      <div className="est-note">Estimates use current A+ material rates and are indicative only. Final cost varies with the map, plot condition and chosen specifications.</div>
      <div style={{ height: 16 }} />
    </div>
  );
}

/* ---------- Part 6: maps ---------- */
const PHASE_REGIONS = {
  "Phase 1": { x: 30, y: 22, r: 11, color: "#BFD3E6" },
  "Phase 2": { x: 57, y: 18, r: 11, color: "#E6C9D6" },
  "Phase 3": { x: 19, y: 47, r: 11, color: "#CFE3C9" },
  "Phase 4": { x: 45, y: 43, r: 11, color: "#E9DCC0" },
  "Phase 5": { x: 73, y: 41, r: 12, color: "#D5CBE6" },
  "Phase 6": { x: 33, y: 71, r: 13, color: "#C9E0E0" },
  "Phase 7": { x: 62, y: 69, r: 12, color: "#E6D4C2" },
  "Phase 8": { x: 84, y: 65, r: 11, color: "#D9E3C2" },
};
function pinPos(L) {
  const reg = PHASE_REGIONS[L.phase] || { x: 50, y: 86, r: 8 };
  let h = 0; for (const c of (L.id || "")) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  const a = (h % 1000) / 1000, b = ((h >> 3) % 1000) / 1000;
  const ang = a * Math.PI * 2, rad = Math.sqrt(b) * reg.r;
  let x = reg.x + Math.cos(ang) * rad, y = reg.y + Math.sin(ang) * rad * 0.85;
  return { x: Math.max(5, Math.min(95, x)), y: Math.max(8, Math.min(88, y)) };
}
function pinColor(L) { if (L.intent === "wanted") return "#5C6B73"; return L.kind === "house" ? "#A98A57" : "#0B5A43"; }

function PinSvg({ mine }) {
  return (
    <svg width="30" height="38" viewBox="0 0 30 38" fill="none">
      <path d="M15 1C7.3 1 1 7.1 1 14.7 1 24 15 37 15 37s14-13 14-22.3C29 7.1 22.7 1 15 1z" fill="currentColor" stroke="#fff" strokeWidth="2" />
      <circle cx="15" cy="14.7" r="5.2" fill="#fff" />
      {mine && <circle cx="15" cy="14.7" r="2.4" fill="currentColor" />}
    </svg>
  );
}

function StreetMap() {

      <path d="M-5 64 L60 -6" stroke="#AFC9D9" strokeWidth="5" fill="none" opacity="0.7" />
      <g stroke="#D9D4CA" strokeWidth="3.4" fill="none" strokeLinecap="round">

      </g>
      <g stroke="#FBFAF7" strokeWidth="2" fill="none" strokeLinecap="round">

function SocietyMap() {
  return (
    <svg className="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <pattern id="plots" width="4" height="4" patternUnits="userSpaceOnUse">
          <path d="M4 0H0V4" fill="none" stroke="rgba(40,40,30,.10)" strokeWidth="0.3" />
        </pattern>
      </defs>
      <rect width="100" height="100" fill="#E7E3DA" />
      <g stroke="#F3F0EA" strokeWidth="2.4" fill="none" strokeLinecap="round">
        <path d="M-2 30 H102" /><path d="M-2 58 H102" /><path d="M30 -2 V102" /><path d="M66 -2 V102" /><path d="M-2 8 L102 92" />
      </g>
      {Object.entries(PHASE_REGIONS).map(([name, r]) => {
        const x = r.x - r.r, y = r.y - r.r, s = r.r * 2;
        return (
          <g key={name}>
            <rect x={x} y={y} width={s} height={s} rx="2.2" fill={r.color} />

            <rect x={x} y={y} width={s} height={s} rx="2.2" fill="none" stroke="rgba(255,255,255,.7)" strokeWidth="0.6" />

        );
      })}

  );
}

function MapsView({ listings, profile, onOpen, onCall, focusId, onFocusConsumed }) {
  const [view, setView] = useState("street");
  const [filter, setFilter] = useState("all");
  const [sel, setSel] = useState(focusId || null);
  useEffect(() => { if (focusId) { setSel(focusId); onFocusConsumed && onFocusConsumed(); } }, [focusId]);
  let pins = listings.filter((l) => l.phase);
  if (filter === "plot") pins = pins.filter((l) => l.kind === "plot" && l.intent !== "wanted");
  else if (filter === "house") pins = pins.filter((l) => l.kind === "house" && l.intent !== "wanted");
  else if (filter === "wanted") pins = pins.filter((l) => l.intent === "wanted");
  else if (filter === "mine") pins = pins.filter((l) => l.ownerId === "me");
  const selL = sel ? listings.find((l) => l.id === sel) : null;
  const chips = [{ id: "all", label: "All" }, { id: "plot", label: "Plots" }, { id: "house", label: "Houses" }, { id: "wanted", label: "Wanted" }, { id: "mine", label: "Mine" }];

  return (
    <div style={{ flex: 1, position: "relative", display: "flex", flexDirection: "column", minHeight: 0 }}>
      <div className="map-canvas" onClick={() => setSel(null)}>
        {view === "street" ? <StreetMap /> : <SocietyMap />}

        {view === "society" && Object.entries(PHASE_REGIONS).map(([name, r]) => (
          <div key={name} className="phase-lbl" style={{ left: r.x + "%", top: r.y + "%" }}>PHASE {name.replace("Phase ", "")}</div>
        ))}

        {pins.map((L) => {
          const p = pinPos(L);
          return (
            <button key={L.id} className={"mpin" + (sel === L.id ? " sel" : "")} style={{ left: p.x + "%", top: p.y + "%", color: pinColor(L) }}

              <PinSvg mine={L.ownerId === "me"} />

        })}

        <div className="map-top" onClick={(e) => e.stopPropagation()}>

          </div>
          <div className="map-chips">
            {chips.map((c) => <button key={c.id} className={"fchip" + (filter === c.id ? " on" : "")} onClick={() => setFilter(c.id)}>{c.label}</button>)}
          </div>
        </div>

        {!selL && (
          <>
            <div className="map-legend" onClick={(e) => e.stopPropagation()}>

            </div>
            <div className="map-count" onClick={(e) => e.stopPropagation()}><MapPin size={13} /> {pins.length} on map</div>
          </>
        )}

        {selL && <MapSheet L={selL} profile={profile} onClose={() => setSel(null)} onOpen={onOpen} onCall={onCall} />}
      </div>
    </div>
  );
}

    setGroups((gs) => gs.map((g) => (g.id === id ? { ...g, unread: 0 } : g)));
    setChatView({ type: "conversation", id });
  }
  function sendMessage(gid, text) {
    const grp = groups.find((g) => g.id === gid);
    const mid = "m" + Date.now();
    setGroups((gs) => gs.map((g) => (g.id === gid ? { ...g, messages: [...g.messages, { id: mid, senderId: "me", text, time: nowTime() }] } : g)));
    if (grp?.dm) return; // private chat — no auto-listing
    const parsed = parseMessage(text);
    if (parsed.length === 0) return;

    const next = [...listingsRef.current];
    let created = 0, mergedW = 0, dupS = 0;
    parsed.forEach((p, idx) => {
      const item = { ...p, id: `L_${gid}_${mid}_${idx}`, ownerId: "me", sourceGroupId: gid, sourceMsgId: mid, raw: text, photos: [] };
      const key = listingKey(item);
      const exIdx = next.findIndex((l) => listingKey(l) === key);
      if (p.intent === "wanted") {
        if (exIdx >= 0) {
          const ex = next[exIdx];
          if (!(ex.interested || []).includes("me")) { next[exIdx] = { ...ex, interested: [...(ex.interested || [ex.ownerId]), "me"] }; mergedW++; }
        } else { next.unshift({ ...item, interested: ["me"], ts: Date.now() }); created++; }
      } else {
        if (exIdx >= 0) dupS++;
        else { next.unshift({ ...item, interested: [], ts: Date.now() }); created++; }
      }
    });

    if (created === 0 && mergedW === 0) {
      toast(dupS > 1 ? "Those properties are already listed — no duplicates created" : "That property is already listed — couldn't create a duplicate", "info");
      return;
    }

    toast("Generating listing…", "loading", true);
    setTimeout(() => {
      setListings(next);
      if (settingsRef.current.matchAlerts) {
        const sales = next.filter((l) => l.intent === "sale");
        const myWanteds = next.filter((l) => l.intent === "wanted" && (l.interested || []).includes("me"));
        const existing = notifsRef.current;
        const fresh = [];
        myWanteds.forEach((w) => {
          sales.forEach((sl) => {
            if (matchesWanted(w, sl)) {
              const nkey = sl.id + "|" + listingKey(w);
              if (!existing.some((n) => n.key === nkey) && !fresh.some((n) => n.key === nkey)) {
                const seller = getSender(sl.ownerId, profile);
                const what = capSize(sl.sizeText || "") + " " + (sl.kind === "house" ? "House" : "Plot");
                const loc = [sl.phase, sl.block, sl.plotNo ? "Plot " + sl.plotNo : null].filter(Boolean).join(", ");
                const price = sl.priceText ? "PKR " + sl.priceText : "price on request";
                fresh.push({ id: "n" + Date.now() + Math.random().toString(36).slice(2, 6), key: nkey, listingId: sl.id, title: "Property match found", body: `A ${what} in ${loc} for ${price} matches your requirement. Posted by ${sl.ownerId === "me" ? "you" : seller.name}.`, ts: Date.now(), read: false });
              }
            }
          });
        });
        if (fresh.length) setNotifs((ns) => [...fresh, ...ns]);
      }
      let msg;
      if (created && !mergedW && !dupS) msg = `✓ ${created} listing${created > 1 ? "s" : ""} created`;
      else {
        const parts = [];
        if (created) parts.push(`${created} created`);
        if (mergedW) parts.push(`added to ${mergedW} buyer request${mergedW > 1 ? "s" : ""}`);
        if (dupS) parts.push(`${dupS} already listed`);
        msg = "✓ " + (parts.join(" · ") || "Nothing new");
      }
      toast(msg, "success");
    }, 1300);
  }
  function openListing(id) { setDetailId(id); }
  function addPhotos(id, urls) { setListings((ls) => ls.map((l) => (l.id === id ? { ...l, photos: [...l.photos, ...urls] } : l))); }
  function removePhoto(id, idx) { setListings((ls) => ls.map((l) => (l.id === id ? { ...l, photos: l.photos.filter((_, i) => i !== idx) } : l))); }
  function messageFromListing(L) { setDetailId(null); if (L.ownerId !== "me") openDM(L.ownerId, L.id); }
  function callFromListing(L) { const b = BROKERS.find((x) => x.id === L.ownerId); if (b) setCall(brokerCallTarget(b)); }
  function openDM(brokerId, aboutListingId) {
    const b = BROKERS.find((x) => x.id === brokerId); if (!b) return;
    const dmId = "dm_" + brokerId;
    setGroups((gs) => {
      if (gs.some((g) => g.id === dmId)) return gs.map((g) => (g.id === dmId ? { ...g, unread: 0, aboutListingId: aboutListingId || g.aboutListingId } : g));
      const greet = { id: dmId + "_g0", senderId: brokerId, text: aboutListingId ? "Assalam o Alaikum! Yes, it’s still available. Happy to share details or arrange a visit." : "Assalam o Alaikum! How can I help you?", time: nowTime() };
      const dm = { id: dmId, dm: true, peerId: brokerId, name: b.name, color: b.color, members: ["me", brokerId], unread: 0, muted: false, aboutListingId: aboutListingId || null, messages: [greet] };
      return [dm, ...gs];
    });
    setChatView({ type: "conversation", id: dmId });
  }
  function endCall(secs) {
    if (call) setCallLog((cl) => [{ id: "cl" + Date.now(), name: call.name, color: call.color, initials: call.initials, isGroup: !!call.isGroup, brokerId: call.brokerId, groupId: call.groupId, direction: "outgoing", ts: Date.now(), duration: secs || 0 }, ...cl]);
    setCall(null);
  }
  function recallFromLog(e) {
    if (e.groupId) { const g = groups.find((x) => x.id === e.groupId); if (g) setCall(groupCallTarget(g)); }
    else if (e.brokerId) { const b = BROKERS.find((x) => x.id === e.brokerId); if (b) setCall(brokerCallTarget(b)); }
  }
  function toggleMute(gid) { setGroups((gs) => gs.map((g) => (g.id === gid ? { ...g, muted: !g.muted } : g))); }
  function clearChat(gid) { setGroups((gs) => gs.map((g) => (g.id === gid ? { ...g, messages: [] } : g))); }
  function sendAttach(gid, attach, text) {
    const mid = "m" + Date.now();
    setGroups((gs) => gs.map((g) => (g.id === gid ? { ...g, messages: [...g.messages, { id: mid, senderId: "me", text: text || "", attach, time: nowTime() }] } : g)));
  }
  function viewOnMap(L) { setDetailId(null); setTab("maps"); setFocusId(L.id); }
  function showWanted() { setDetailId(null); setTab("listings"); setListFilter("wanted"); }
  function openNotifListing(n) { setNotifs((ns) => ns.map((x) => (x.id === n.id ? { ...x, read: true } : x))); setShowNotifs(false); openListing(n.listingId); }
  function markAllRead() { setNotifs((ns) => ns.map((x) => ({ ...x, read: true }))); }
  function logout() { setShowProfile(false); setTab("chats"); setScreen("welcome"); }
  function createGroup({ name, members, allowMemberAdd }) {
    const id = "g" + Date.now();
    const ng = { id, name, color: pickColor(name), members: [...members, "me"], adminId: "me", allowMemberAdd, unread: 0, messages: [] };
    setGroups((gs) => [ng, ...gs]);
    setChatView({ type: "conversation", id });
  }
  function addMember(gid, bid) {
    setGroups((gs) => gs.map((g) => (g.id === gid && !g.members.includes(bid) ? { ...g, members: [...g.members, bid] } : g)));
  }
  function toggleAddPerm(gid) {
    setGroups((gs) => gs.map((g) => (g.id === gid ? { ...g, allowMemberAdd: !g.allowMemberAdd } : g)));
  }

  return (
    <div className="pc-root">
      <style>{STYLE}</style>
      <div className="pc-stage">
        <div className="pc-bezel">
          <div className="pc-screen">
            <div className="pc-island" />
            <StatusBar />

            <div className="pc-body" style={{ display: screen === "home" ? "none" : "block" }}>
              {screen === "welcome" && <Welcome onNext={() => setScreen("phone")} />}
              {screen === "phone" && <PhoneEntry phone={phone} setPhone={setPhone} onBack={() => setScreen("welcome")} onNext={() => setScreen("otp")} />}
              {screen === "otp" && <OtpVerify phone={phone} onBack={() => setScreen("phone")} onNext={() => setScreen("profile")} />}
              {screen === "profile" && <ProfileSetup profile={profile} setProfile={setProfile} onDone={() => setScreen("home")} />}
            </div>

            {screen === "home" && (
              <Home profile={profile} tab={tab} setTab={setTab} toast={toast}
                groups={groups} onOpenChat={openChat} onNewGroup={() => setChatView({ type: "newgroup" })}
                listings={listings} onOpenListing={openListing} onCallListing={callFromListing} onMessageListing={messageFromListing}
                mapFocusId={focusId} onMapFocusConsumed={() => setFocusId(null)}
                onShowWanted={showWanted} listFilter={listFilter} onListFilterConsumed={() => setListFilter(null)}
                onOpenNotifs={() => setShowNotifs(true)} onOpenProfile={() => setShowProfile(true)} unreadNotifs={notifs.filter((n) => !n.read).length}
                callLog={callLog} onCallAgain={recallFromLog} />
            )}

            {screen === "home" && chatView?.type === "conversation" && activeGroup && (
              <Conversation group={activeGroup} profile={profile}
                onBack={() => setChatView(null)}
                onInfo={() => setChatView({ type: "groupinfo", id: activeGroup.id })}
                onCall={() => setCall(activeGroup.dm ? brokerCallTarget(BROKERS.find((b) => b.id === activeGroup.peerId)) : groupCallTarget(activeGroup))}
                onSend={sendMessage} onSendAttach={sendAttach} onToggleMute={toggleMute} onClearChat={clearChat}
                onOpenListing={openListing} listings={listings} toast={toast} />
            )}
            {screen === "home" && chatView?.type === "groupinfo" && activeGroup && (
              <GroupInfo group={activeGroup} profile={profile}
                onBack={() => setChatView({ type: "conversation", id: activeGroup.id })}
                onAddMember={addMember} onToggleAddPerm={toggleAddPerm}
                onCallMember={(b) => b && setCall(brokerCallTarget(b))} toast={toast} />
            )}
            {screen === "home" && chatView?.type === "newgroup" && (
              <NewGroup profile={profile} onBack={() => setChatView(null)} onCreate={createGroup} />
            )}

            {screen === "home" && detailId && (() => {
              const L = listings.find((x) => x.id === detailId);
              if (!L) return null;
              const grp = groups.find((g) => g.id === L.sourceGroupId);
              return <ListingDetail listing={L} profile={profile} group={grp}
                onBack={() => setDetailId(null)}
                onAddPhotos={(urls) => addPhotos(L.id, urls)}
                onRemovePhoto={(i) => removePhoto(L.id, i)}
                onCall={() => callFromListing(L)} onMessage={() => messageFromListing(L)} onViewMap={() => viewOnMap(L)}
                onCallBroker={(id) => { const b = BROKERS.find((x) => x.id === id); if (b) setCall(brokerCallTarget(b)); }} />;
            })()}

            {screen === "home" && showNotifs && (
              <NotificationsPanel notifs={notifs} onBack={() => setShowNotifs(false)} onOpen={openNotifListing} onMarkAll={markAllRead} />
            )}
            {screen === "home" && showProfile && (
              <ProfilePanel profile={profile} setProfile={setProfile} phone={phone} settings={settings} setSettings={setSettings} onBack={() => setShowProfile(false)} onLogout={logout} />
            )}

            {call && <CallScreen target={call} onEnd={endCall} />}

            {toastMsg && (
              <div className="toast">
                <span className="tk" style={toastMsg.type === "info" ? { color: "#E8C98A" } : undefined}>{toastMsg.type === "loading" ? <Loader2 size={15} style={{ animation: "spin 1s linear infinite" }} /> : toastMsg.type === "info" ? <Info size={15} /> : <Check size={15} strokeWidth={3} />}</span>
                {toastMsg.msg}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- standalone bootstrap (added for the browser build) ---------- */
import { createRoot } from "react-dom/client";
createRoot(document.getElementById("root")).render(<App />);
const _boot = document.getElementById("boot");
if (_boot) _boot.remove();
</script>
</body>
</html>
